<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patterns — Poly Randomizer</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0 auto;
    max-width: 640px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px 16px;
    box-sizing: border-box;
  }
  .back {
    font-size: 13px;
    color: #6d32a8;
    text-decoration: none;
  }
  .back:hover { text-decoration: underline; }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 16px 0 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin: 0 0 20px;
  }
  .pattern-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #222;
  }
  .pattern-str {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: #888;
    flex: 1;
    word-break: break-all;
  }
  .pattern-link {
    font-size: 12px;
    color: #6d32a8;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pattern-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<a class="back" href="index.html">← Poly Randomizer</a>
<h1 id="page-title"></h1>
<p class="subtitle" id="subtitle">Loading…</p>
<div id="list"></div>

<script>
const params  = new URLSearchParams(location.search);
const balls   = params.get('balls')  || '4';
const family  = params.get('family') || '3over2';
const state   = params.get('state')  || 'ground';

const familyLabel = { '3over2': '3 over 2', '4over3': '4 over 3', '5over2': '5 over 2', '5over3': '5 over 3', '5over4': '5 over 4' };
const stateLabel  = { ground: 'Ground', active: 'Active' };
const title = `${balls} balls · ${familyLabel[family]} · ${stateLabel[state]}`;

document.title = `${title} — Poly Randomizer`;
document.getElementById('page-title').textContent = title;

function buildJLUrl(pattern) {
  const bps = family === '4over3' ? 15 : 10;
  return `https://jugglinglab.org/anim?pattern=${pattern};bps=${bps};dwell=1.5;colors={109,50,168};fps=50`;
}

function buildHomeUrl(pattern) {
  const p = new URLSearchParams();
  p.set('p', pattern);
  p.set('b', balls);
  p.set('f', family);
  return `index.html?${p.toString()}`;
}

async function load() {
  const subtitleEl = document.getElementById('subtitle');
  try {
    const resp = await fetch(`data/${balls}b_${family}_${state}.txt`);
    if (!resp.ok) throw new Error();
    const lines = (await resp.text()).split('\n');
    let totalCount = null;
    const patterns = lines.filter(l => {
      if (l.startsWith('#total=')) { totalCount = parseInt(l.slice(7)); return false; }
      return Boolean(l);
    });
    subtitleEl.textContent = totalCount
      ? `${patterns.length} patterns (random sample of ${totalCount})`
      : `${patterns.length} patterns`;

    const list = document.getElementById('list');
    for (const pattern of patterns) {
      const row = document.createElement('div');
      row.className = 'pattern-row';

      const str = document.createElement('span');
      str.className = 'pattern-str';
      str.textContent = pattern;

      const jlLink = document.createElement('a');
      jlLink.className = 'pattern-link';
      jlLink.href = buildJLUrl(pattern);
      jlLink.target = '_blank';
      jlLink.rel = 'noopener';
      jlLink.textContent = 'JugglingLab ↗';

      const homeLink = document.createElement('a');
      homeLink.className = 'pattern-link';
      homeLink.href = buildHomeUrl(pattern);
      homeLink.textContent = 'Try it →';

      row.appendChild(str);
      row.appendChild(jlLink);
      row.appendChild(homeLink);
      list.appendChild(row);
    }
  } catch {
    subtitleEl.textContent = 'Failed to load patterns.';
  }
}

load();
</script>
</body>
</html>
