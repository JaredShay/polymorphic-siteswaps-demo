<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poly Randomizer</title>
<link rel="icon" href="favicons/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicons/favicon.svg">
<link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32.png">
<link rel="apple-touch-icon" href="favicons/apple-touch-icon.png">
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px 12px;
    box-sizing: border-box;
  }
  #stage {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  #gif { max-width: 100%; max-height: 100%; display: block; }
  #status {
    position: absolute;
    font-size: 13px;
    color: #bbb;
    letter-spacing: 0.02em;
  }
  #pattern {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    color: #888;
    word-break: break-all;
    text-align: center;
    max-width: 480px;
    min-height: 1.2em;
  }
  #filters {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 480px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-label {
    font-size: 13px;
    color: #888;
    width: 120px;
    flex-shrink: 0;
  }
  .toggle-group { display: flex; gap: 6px; }
  .toggle {
    font-size: 13px;
    font-weight: 500;
    padding: 5px 14px;
    border: 1.5px solid #444;
    border-radius: 6px;
    background: transparent;
    color: #888;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .toggle.on {
    background: #6d32a8;
    border-color: #6d32a8;
    color: #fff;
  }
  .toggle:hover:not(:disabled) { border-color: #7d3cc0; }
  .toggle:disabled { opacity: 0.35; cursor: default; }
  #randomize-btn {
    font-size: 15px;
    font-weight: 500;
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    background: #6d32a8;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  #randomize-btn:hover { background: #7d3cc0; }
  #randomize-btn:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>

<div id="stage">
  <span id="status">Loading…</span>
  <img id="gif" alt="Juggling pattern animation" referrerpolicy="no-referrer" style="display:none">
</div>
<div id="pattern"></div>

<div id="filters">
  <div class="filter-row">
    <span class="filter-label">Balls</span>
    <div class="toggle-group">
      <button class="toggle on" data-group="balls" data-value="4">4</button>
      <button class="toggle on" data-group="balls" data-value="5">5</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Polyrhythm</span>
    <div class="toggle-group">
      <button class="toggle on" data-group="family" data-value="3over2">3 over 2</button>
      <button class="toggle on" data-group="family" data-value="4over3">4 over 3</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">State</span>
    <div class="toggle-group">
      <button class="toggle on" data-group="state" data-value="active">Active</button>
      <button class="toggle on" data-group="state" data-value="ground">Ground</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Run symmetrical</span>
    <div class="toggle-group">
      <button class="toggle" data-group="sym" data-value="sym">On</button>
    </div>
  </div>
</div>

<button id="randomize-btn">Randomize</button>

<script>
const filters = {
  balls:       new Set(['4', '5']),
  family:      new Set(['3over2', '4over3']),
  state:       new Set(['active', 'ground']),
  symmetrical: false,
};

const cache = {};

const gif       = document.getElementById('gif');
const statusEl  = document.getElementById('status');
const patternEl = document.getElementById('pattern');
const randBtn   = document.getElementById('randomize-btn');
const symToggle = document.querySelector('.toggle[data-group="sym"]');

// ----- Filter toggle handling -----

function updateSymToggle() {
  const blocked = filters.state.has('active');
  if (blocked) {
    filters.symmetrical = false;
    symToggle.classList.remove('on');
    symToggle.disabled = true;
  } else {
    symToggle.disabled = false;
  }
}

document.querySelectorAll('.toggle[data-group]').forEach(el => {
  el.addEventListener('click', () => {
    const group = el.dataset.group;
    const value = el.dataset.value;

    if (group === 'sym') {
      filters.symmetrical = !filters.symmetrical;
      el.classList.toggle('on', filters.symmetrical);
      return;
    }

    const set = filters[group];
    if (set.has(value)) {
      if (set.size === 1) return; // always keep at least one selected
      set.delete(value);
      el.classList.remove('on');
    } else {
      set.add(value);
      el.classList.add('on');
    }

    if (group === 'state') updateSymToggle();
  });
});

updateSymToggle();

// ----- Data loading -----

function dataKey(balls, family, state) {
  return `data/${balls}b_${family}_${state}.txt`;
}

async function loadPatterns() {
  const keys = [];
  for (const b of filters.balls) {
    for (const family of filters.family) {
      for (const s of filters.state) {
        keys.push({ key: dataKey(b, family, s), balls: parseInt(b), family });
      }
    }
  }

  await Promise.all(
    keys
      .filter(({ key }) => cache[key] === undefined)
      .map(async ({ key }) => {
        try {
          const resp = await fetch(key);
          cache[key] = resp.ok ? (await resp.text()).split('\n').filter(Boolean) : [];
        } catch {
          cache[key] = [];
        }
      })
  );

  const pool = [];
  for (const { key, balls, family } of keys) {
    for (const pattern of (cache[key] || [])) {
      pool.push({ pattern, balls, family });
    }
  }
  return pool;
}

// ----- Pattern helpers -----

function mirrorPattern(pattern) {
  return pattern.replace(/\(([^,)]+),([^)]+)\)/g, '($2,$1)');
}

function buildUrl(pattern, family) {
  const bps = family === '4over3' ? 15 : 10;
  return `https://jugglinglab.org/anim?pattern=${pattern};bps=${bps};dwell=1.5;colors={109,50,168};fps=50;redirect=true`;
}

// ----- Randomize -----

async function randomize() {
  randBtn.disabled = true;
  gif.style.display = 'none';
  statusEl.style.display = 'block';
  statusEl.textContent = 'Loading…';

  let pool;
  try {
    pool = await loadPatterns();
  } catch {
    statusEl.textContent = 'Failed to load patterns';
    randBtn.disabled = false;
    return;
  }

  if (pool.length === 0) {
    console.warn('[poly] no patterns matched filters', Object.fromEntries(
      Object.entries(filters).map(([k, v]) => [k, v instanceof Set ? [...v] : v])
    ));
    statusEl.textContent = 'No patterns match current filters';
    randBtn.disabled = false;
    return;
  }

  const { pattern: base, balls, family } = pool[Math.floor(Math.random() * pool.length)];
  const pattern = filters.symmetrical ? base + mirrorPattern(base) : base;
  console.log('[poly] pool size:', pool.length, '| selected:', { base, balls, family, pattern });

  patternEl.textContent = pattern;
  statusEl.textContent = 'Rendering…';

  const url = buildUrl(pattern, family);
  console.log('[poly] url:', url);

  const probe = new Image();
  probe.referrerPolicy = 'no-referrer';
  probe.onload = () => {
    console.log('[poly] probe loaded');
    gif.src = url;
    gif.style.display = 'block';
    statusEl.style.display = 'none';
    randBtn.disabled = false;
  };
  probe.onerror = (e) => {
    fetch(url, { method: 'HEAD', mode: 'no-cors' })
      .then(r => console.error('[poly] probe failed — fetch status:', r.status, r.type, e))
      .catch(err => console.error('[poly] probe failed — fetch error:', err, e));
    statusEl.textContent = 'Render failed — try again';
    randBtn.disabled = false;
  };
  probe.src = url;
}

randBtn.addEventListener('click', randomize);
randomize();
</script>
</body>
</html>
